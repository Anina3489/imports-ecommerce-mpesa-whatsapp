<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium E-commerce Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
           color: #333;
        }
        header {
            background-color: royalblue;
            color: gold;
            padding: 20px;
            text-align: center;
        }
        .container {
            width: 80%;
            margin: auto;
            overflow: hidden;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }
        button {
            padding: 10px;
            background-color: royalblue;
            color: gold;
            border: none;
            cursor: pointer;
        }
        .product {
            border: 1px solid #ccc;
            margin: 10px;
            padding: 10px;
            background: white;
            position: relative;
        }
        .scarcity {
            color: red;
            font-weight: bold;
        }
        footer {
            text-align: center;
            padding: 20px;
            background-color: royalblue;
            color: gold;
        }
    </style>
</head>
<body>
    <header>
        <h1>Pre-Order Import Business</h1>
        <input type="text" id="search" placeholder="Search products...">
        <button onclick="searchProducts()">Search</button>
    </header>
    <div class="container">
        <div id="products">
            <div class="product">
                <h2>Product Name</h2>
                <p>Description of the product.</p>
                <span class="scarcity">Only 2 left in stock!</span>
                <button onclick="whatsappAutomation()">Check out with WhatsApp</button>
                <button onclick="mpesaCheckout()">Pay with M-Pesa</button>
            </div>
        </div>
    </div>
    <footer>
        <p>Follow us on social media for latest updates!</p>
    </footer>
    <script>
        function searchProducts() {
            // Implement search/filter functionality
            alert('Searching for products...');
        }
        function whatsappAutomation() {
            // Implement WhatsApp automation checkout
            alert('Redirecting to WhatsApp for checkout...');
        }
        function mpesaCheckout() {
            // Implement M-Pesa checkout process
            alert('Initiating M-Pesa checkout...');
        }
    </script>
</body>
</html>
