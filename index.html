<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium E-commerce Website</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>

<header>
    <nav>
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#products">Products</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>
</header>

<main>
    <section id="hero">
        <h1>Welcome to Our E-commerce Store</h1>
        <p>Shop the best products now!</p>
    </section>

    <section id="products">
        <h2>Featured Products</h2>
        <div class="product-grid">
            <!-- Products will be dynamically loaded here -->
        </div>
    </section>

    <section id="countdown">
        <h2>Limited Time Offer</h2>
        <div id="timer"></div>
    </section>

    <section id="cart">
        <h2>Your Cart</h2>
        <div id="cart-drawer"></div>
    </section>
</main>

<footer>
    <div>
        <h3>Connect With Us</h3>
        <a href="https://wa.me/your_number">WhatsApp</a>
    </div>
</footer>

<script>
    // Countdown Timer
    const countdown = () => {
        const endDate = new Date('2026-12-31T23:59:59');
        const now = new Date();
        const totalSeconds = (endDate - now) / 1000;

        const days = Math.floor(totalSeconds / 3600 / 24);
        const hours = Math.floor(totalSeconds / 3600) % 24;
        const minutes = Math.floor(totalSeconds / 60) % 60;
        const seconds = Math.floor(totalSeconds % 60);

        document.getElementById('timer').innerHTML = `<p>${days} Days ${hours} Hours ${minutes} Minutes ${seconds} Seconds Until Offer Ends!</p>`;
    };
    setInterval(countdown, 1000);
</script>
</body>
</html>
