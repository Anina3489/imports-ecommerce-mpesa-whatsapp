<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Premium E-commerce</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Playfair Display', serif; color: #333; background-color: #f7f7f7; }
        /* Additional styles */
    </style>
</head>
<body>
    <header>
        <div class="hero">
            <h1>Welcome to Our Premium E-commerce Store</h1>
            <div class="animated-showcase">
                <!-- Animated product showcase here -->
            </div>
        </div>
        <button class="whatsapp-support">Chat with us on WhatsApp</button>
    </header>
    <main>
        <section class="search-filter">
            <input type="text" id="live-search" placeholder="Search products...">
            <select id="category-filter">
                <option value="all">All Categories</option>
                <option value="category1">Category 1</option>
                <option value="category2">Category 2</option>
            </select>
            <input type="range" id="price-range" min="0" max="1000" value="500">
        </section>
        <section class="product-list">
            <!-- Premium products with ratings and badges -->
            <div class="product-item">
                <h2>Product 1</h2>
                <p>Rating: ⭐⭐⭐⭐⭐</p>
                <span class="badge">New!</span>
            </div>
            <!-- More products... -->
        </section>
        <section class="scarcity-indicators">
            <div class="slots-left">Slots left: 5</div>
            <div class="people-viewing">People viewing: 10</div>
            <div class="progress-bar"><span style="width: 50%;">50% sold</span></div>
        </section>
        <section class="countdown-timer">
            <p>Next Sale Countdown: <span id="countdown">3 days 5 hours</span></p>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Premium E-commerce. All rights reserved.</p>
    </footer>

</body>
</html>
